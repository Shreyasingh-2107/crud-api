version: "3.9"

# ╔══════════════════════════════════════════════════════════╗
# ║          Containerised CRUD REST API – Compose           ║
# ║  Services: nginx (proxy) · api (Node.js) · db (Postgres) ║
# ╚══════════════════════════════════════════════════════════╝

services:

  # ── 1. Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: crud_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 2. Node.js REST API ──────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: crud_api
    expose:
      - "3000"
    environment:
      NODE_ENV:    production
      PORT:        3000
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${POSTGRES_DB:-cruddb}
      DB_USER:     ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── 3. PostgreSQL Database ───────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: crud_db
    expose:
      - "5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-cruddb}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cruddb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ── Volumes ──────────────────────────────────────────────────
volumes:
  db_data:
    name: crud_db_data

# ── Networks ─────────────────────────────────────────────────
networks:
  frontend:
    name: crud_frontend
    driver: bridge
  backend:
    name: crud_backend
    driver: bridge
    internal: true          # DB not reachable from host directly
